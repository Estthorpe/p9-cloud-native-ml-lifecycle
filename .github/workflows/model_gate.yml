name: model-gate

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: pip install -r requirements-dev.txt

      - name: Fetch test data assets
        run: |
          mkdir -p data_sensor data_labels
          az storage fs file download --file-system datalake --path raw/sensor_data_real.csv --destination ./data_sensor/sensor_data_real.csv --account-name stclariv2v2zea7e6dd42 --auth-mode login
          az storage fs file download --file-system datalake --path raw/anomaly_labels_real.csv --destination ./data_labels/anomaly_labels_real.csv --account-name stclariv2v2zea7e6dd42 --auth-mode login
      - name: Run evaluation gate
        env:
          P9_SENSOR_DATA_PATH: ./data_sensor/sensor_data_real.csv
          P9_LABELS_PATH: ./data_labels/anomaly_labels_real.csv
        run: python -m src.models.evaluate
